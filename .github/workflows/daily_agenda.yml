name: Daily Agenda Builder

on:
  schedule:
    # Runs at 6:00 AM PDT (13:00 UTC) every day
    # PDT = UTC-7, so 6:00 AM PDT = 13:00 UTC
    - cron: '0 13 * * *'
  workflow_dispatch:   # Allows manual trigger from GitHub Actions UI

jobs:
  build-agenda:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit the output file back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            google-auth \
            google-auth-oauthlib \
            google-auth-httplib2 \
            google-api-python-client \
            feedparser \
            pytz

      - name: Write Google Calendar credentials file
        env:
          GCAL_SERVICE_ACCOUNT_JSON: ${{ secrets.GCAL_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$GCAL_SERVICE_ACCOUNT_JSON" > scripts/service_account.json

      - name: Fetch Google Calendar events
        env:
          GCAL_CALENDAR_ID: ${{ secrets.GCAL_CALENDAR_ID }}
        run: python scripts/fetch_calendar.py

      - name: Fetch Fox News headlines
        run: python scripts/fetch_rss.py

      - name: Combine into daily agenda file
        run: python scripts/build_agenda.py

      - name: Clean up credentials
        if: always()
        run: rm -f scripts/service_account.json

      - name: Commit and push agenda file
        run: |
          git config user.name "Daily Agenda Bot"
          git config user.email "actions@github.com"
          git add agenda/daily_agenda.txt
          git diff --cached --quiet || git commit -m "📅 Daily agenda update: $(date +'%Y-%m-%d')"
          git push
